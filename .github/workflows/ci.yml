name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Run code generator
        run: dotnet run --project DrunkDeer.CodeGen/DrunkDeer.CodeGen.csproj

      - name: Check codegen is up to date
        run: git diff --exit-code -- DrunkDeer/Generated

      - name: Build
        run: dotnet build DrunkDeer/DrunkDeer.slnx --nologo

      - name: Test
        run: dotnet test DrunkDeer/DrunkDeer.slnx --nologo

      - name: Build deerkb CLI
        run: dotnet build deerkb/deerkb.slnx --nologo

      - name: Test deerkb CLI
        run: dotnet test deerkb/deerkb.slnx --nologo
