name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Run code generator
        run: dotnet run --project DrunkDeer.CodeGen/DrunkDeer.CodeGen.csproj

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: dotnet build DrunkDeer/DrunkDeer.csproj -c Release -p:Version=${{ steps.version.outputs.VERSION }} --nologo

      - name: Pack NuGet
        run: |
          mkdir -p artifacts
          dotnet pack DrunkDeer/DrunkDeer.csproj \
            -c Release \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            --no-build \
            --output artifacts \
            --nologo

      - name: Create DLL archive
        run: |
          dotnet publish DrunkDeer/DrunkDeer.csproj \
            -c Release \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            --no-build \
            --output ./publish \
            --nologo
          zip -j "artifacts/DrunkDeer-${{ steps.version.outputs.VERSION }}.zip" ./publish/*.dll

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.nupkg
            artifacts/*.zip
          generate_release_notes: true
