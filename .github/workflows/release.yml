name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Run code generator
        run: dotnet run --project DrunkDeer.CodeGen/DrunkDeer.CodeGen.csproj

      - name: Check codegen is up to date
        run: git diff --exit-code -- DrunkDeer/Generated

      - name: Build
        run: dotnet build DrunkDeer/DrunkDeer.slnx --nologo

      - name: Test
        run: dotnet test DrunkDeer/DrunkDeer.slnx --nologo

  release:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Run code generator
        run: dotnet run --project DrunkDeer.CodeGen/DrunkDeer.CodeGen.csproj

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: dotnet build DrunkDeer/DrunkDeer.csproj -c Release -p:Version=${{ steps.version.outputs.VERSION }} --nologo

      - name: Pack NuGet
        run: |
          mkdir -p artifacts
          dotnet pack DrunkDeer/DrunkDeer.csproj \
            -c Release \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            --no-build \
            --output artifacts \
            --nologo

      - name: Create DLL archive
        run: |
          dotnet publish DrunkDeer/DrunkDeer.csproj \
            -c Release \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            --no-build \
            --output ./publish \
            --nologo
          zip -j "artifacts/DrunkDeer-${{ steps.version.outputs.VERSION }}.zip" \
            ./publish/DrunkDeer.dll \
            ./publish/HidSharp.dll

      - name: Publish to NuGet
        run: dotnet nuget push artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.nupkg
            artifacts/*.zip
          generate_release_notes: true
